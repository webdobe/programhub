services:
  # Loads matching override config entities for a given
  # (og_role_id, group_entity_type, group_entity_id) tuple.
  og_permissions_override.resolver:
    class: Drupal\og_permissions_override\OgPermissionOverrideResolver
    arguments:
      - '@entity_type.manager'

  # Decorates `og.access` so per-group overrides actually affect access
  # decisions. The decorator extends concrete `OgAccess` (not just the
  # interface) so contrib OG's type-hints — which expect the concrete
  # class — accept our instance. See the decorator's class docblock.
  og_permissions_override.og_access_decorator:
    class: Drupal\og_permissions_override\Access\OgAccessOverrideDecorator
    decorates: og.access
    arguments:
      - '@og_permissions_override.og_access_decorator.inner'
      - '@og_permissions_override.resolver'
      - '@og.membership_manager'
