dashboard:
  version: 1.x
  css:
    theme:
      css/programhub-dashboard.css: {}
  dependencies:
    # Gin's CSS custom properties (--gin-color-*, --gin-spacing-*, etc.)
    # live in this library. Depending on it explicitly means our dashboard
    # styles work even if the page somehow renders without Gin's full
    # asset chain attached (admin route mismatches, route-specific theme
    # negotiation, etc.).
    - gin/gin_base

# Icons for the Programs + Create dropdowns we inject into Gin's toolbar.
# Attached via the navigation render array in programhub_dashboard.module.
toolbar_icons:
  version: 1.x
  css:
    theme:
      css/toolbar-icons.css: {}

# Layout for the content-overview cards we append to the canonical
# group page via hook_group_view_alter(). Attached by GroupDashboard.
group_dashboard:
  version: 1.x
  css:
    theme:
      css/group-dashboard.css: {}
  dependencies:
    - gin/gin_base
