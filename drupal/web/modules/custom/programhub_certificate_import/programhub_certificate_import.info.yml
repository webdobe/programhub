name: 'ProgramHub Certificate Import'
type: module
description: 'Imports certificate (degree/credential) overview, learning outcomes, and required-course list from NIC catalog program-guidelines pages. Adds a Certificates tab on program nodes for managing them and triggering imports.'
package: 'ProgramHub'
core_version_requirement: ^10 || ^11
dependencies:
  - drupal:node
  - drupal:taxonomy
  - drupal:paragraphs
  - programhub_course_import:programhub_course_import
  - group:group
  - group:gnode
  - programhub_dashboard:programhub_dashboard
