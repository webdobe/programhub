id: aaf_student_survey
title: 'AAF Student Survey'
description: 'Student feedback on the AAF Addys event and the local creative community.'
categories: {  }
elements: |-
  overall_experience:
    '#type': radios
    '#title': 'How would you rate your overall experience at the Addys?'
    '#title_display': before
    '#options':
      '1': '1 — Very poor'
      '2': '2'
      '3': '3'
      '4': '4'
      '5': '5 — Excellent'
    '#required': true
  met_expectations:
    '#type': radios
    '#title': 'Did the event meet your expectations?'
    '#options':
      'yes': 'Yes'
      'somewhat': 'Somewhat'
      'no': 'No'
    '#required': true
  value_for_cost:
    '#type': radios
    '#title': 'Did you feel the event was worth the cost (ticket + submissions)?'
    '#options':
      '1': '1 — Not at all'
      '2': '2'
      '3': '3'
      '4': '4'
      '5': '5 — Absolutely'
    '#required': true
  would_attend_again:
    '#type': radios
    '#title': 'Would you attend again next year?'
    '#options':
      'yes': 'Yes'
      'maybe': 'Maybe'
      'no': 'No'
    '#required': true
  designed_for_students:
    '#type': radios
    '#title': 'To what extent did you feel the event was designed with students in mind?'
    '#options':
      '1': '1 — Not at all'
      '2': '2'
      '3': '3'
      '4': '4'
      '5': '5 — Very much'
    '#required': true
  felt_welcomed:
    '#type': radios
    '#title': 'Did you feel welcomed and included by professionals at the event?'
    '#options':
      '1': '1 — Not at all'
      '2': '2'
      '3': '3'
      '4': '4'
      '5': '5 — Very much'
    '#required': true
  meaningful_interactions:
    '#type': radios
    '#title': 'Did you have any meaningful interactions with professionals?'
    '#options':
      'yes': 'Yes'
      'no': 'No'
    '#required': true
  connection_importance:
    '#type': radios
    '#title': 'How important is it to you to have opportunities to connect with professionals outside of the event (mentorship, meetups, etc.)?'
    '#options':
      '1': '1 — Not important'
      '2': '2'
      '3': '3'
      '4': '4'
      '5': '5 — Very important'
    '#required': true
  ongoing_engagement:
    '#type': radios
    '#title': 'Would you be interested in ongoing engagement with professionals (events, mentorship, AAF involvement)?'
    '#options':
      'yes': 'Yes'
      'maybe': 'Maybe'
      'no': 'No'
    '#required': true
  production_quality:
    '#type': radios
    '#title': 'How would you rate the overall production quality of the event (setup, flow, technical execution)?'
    '#options':
      '1': '1 — Very poor'
      '2': '2'
      '3': '3'
      '4': '4'
      '5': '5 — Excellent'
    '#required': true
  most_valuable:
    '#type': textarea
    '#title': 'What was the most valuable part of the event for you?'
  needed_to_return:
    '#type': textarea
    '#title': 'What would need to improve for you to attend again?'
  email:
    '#type': email
    '#title': 'Email (optional)'
    '#description': 'Only if you would like follow-up. Responses are otherwise anonymous.'
