id: aaf_professional_survey
title: 'AAF Professional Survey'
description: 'Professional / educator feedback on the AAF Addys event and the local creative community.'
categories: {  }
elements: |-
  overall_quality:
    '#type': radios
    '#title': 'How would you rate the overall quality of the Addys event?'
    '#options':
      '1': '1 — Very poor'
      '2': '2'
      '3': '3'
      '4': '4'
      '5': '5 — Excellent'
    '#required': true
  reflects_standards:
    '#type': radios
    '#title': 'Do you feel the event reflects the standards of the local creative community?'
    '#options':
      'yes': 'Yes'
      'somewhat': 'Somewhat'
      'no': 'No'
    '#required': true
  engagement_level:
    '#type': radios
    '#title': 'How would you describe the current level of engagement between professionals and students in the local AAF community?'
    '#options':
      '1': '1 — Very low'
      '2': '2'
      '3': '3'
      '4': '4'
      '5': '5 — Very strong'
    '#required': true
  engagement_change:
    '#type': radios
    '#title': 'Compared to previous years, how has community engagement changed?'
    '#options':
      'improved': 'Improved'
      'same': 'Stayed the same'
      'declined': 'Declined'
    '#required': true
  student_engagement_importance:
    '#type': radios
    '#title': 'How important is student engagement to the long-term health of the organization?'
    '#options':
      '1': '1 — Not important'
      '2': '2'
      '3': '3'
      '4': '4'
      '5': '5 — Critical'
    '#required': true
  enough_interaction:
    '#type': radios
    '#title': 'Do you feel there are enough opportunities to interact with students outside of the event?'
    '#options':
      'yes': 'Yes'
      'no': 'No'
    '#required': true
  students_included:
    '#type': radios
    '#title': 'Do you believe students are meaningfully included in the event experience?'
    '#options':
      '1': '1 — Not at all'
      '2': '2'
      '3': '3'
      '4': '4'
      '5': '5 — Very much'
    '#required': true
  willing_to_participate:
    '#type': radios
    '#title': 'Would you be willing to participate in student-focused engagement (mentorship, portfolio reviews, small events)?'
    '#options':
      'yes': 'Yes'
      'maybe': 'Maybe'
      'no': 'No'
    '#required': true
  production_quality:
    '#type': radios
    '#title': 'How would you rate the production quality of the event (setup, flow, technical execution)?'
    '#options':
      '1': '1 — Very poor'
      '2': '2'
      '3': '3'
      '4': '4'
      '5': '5 — Excellent'
    '#required': true
  awards_credible:
    '#type': radios
    '#title': 'Do you feel the awards structure is balanced and credible?'
    '#options':
      'yes': 'Yes'
      'somewhat': 'Somewhat'
      'no': 'No'
    '#required': true
  working_well:
    '#type': textarea
    '#title': 'What is working well with the current event/community?'
  most_important_change:
    '#type': textarea
    '#title': 'What is the most important change needed moving forward?'
  email:
    '#type': email
    '#title': 'Email (optional)'
    '#description': 'Only if you would like follow-up. Responses are otherwise anonymous.'
