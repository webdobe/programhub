    '#type': textarea
    '#title': 'Describe the Opportunity'
    '#required': true
  audience:
    '#type': checkboxes
    '#title': 'Who is this for?'
    '#options':
      'current students': 'Current students'
      'graduating students': 'Graduating students'
      alumni: Alumni
      'faculty / program collaboration': 'Faculty / program collaboration'
  timeline:
    '#type': textfield
    '#title': 'Timeline / Important Dates'
  paid_status:
    '#type': radios
    '#title': 'Paid or Unpaid'
    '#options':
      paid: Paid
      unpaid: Unpaid
      'not applicable': 'Not applicable'
  location_type:
    '#type': radios
    '#title': Location
    '#options':
      remote: Remote
      'in person': 'In person'
      hybrid: Hybrid
  notes:
    '#type': textarea
    '#title': 'Anything else we should know?'
